name: Pawbond
options:
  bundleIdPrefix: com.shimondeitel.multipet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pawbond:
    type: application
    platform: iOS
    sources:
      - path: Pawbond
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.multipet
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pawbond/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PawbondTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PawbondTests
      - path: Pawbond.storekit
    dependencies:
      - target: Pawbond
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.multipet.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PawbondUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PawbondUITests
    dependencies:
      - target: Pawbond
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.multipet.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pawbond:
    build:
      targets:
        Pawbond: all
        PawbondTests: [test]
        PawbondUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pawbond.storekit
    test:
      config: Debug
      storeKitConfiguration: Pawbond.storekit
      targets:
        - PawbondTests
        - PawbondUITests
    archive:
      config: Release
